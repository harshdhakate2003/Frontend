<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
    <script src="https://kit.fontawesome.com/7eb253e164.js" crossorigin="anonymous"></script>
</head>
<body>
    <div id="navbar">
        <div id="nav_top">
            <div id="logo_div">
                <img id="img1" src="https://i5.walmartimages.com/dfw/63fd9f59-14e2/9d304ce6-96de-4331-b8ec-c5191226d378/v1/spark-icon.svg" alt="">
            </div>

            <div id="pickup_div">
                <div id="img_div">
                    <img id="img2" src="https://i5.walmartimages.com/dfw/4ff9c6c9-ad46/k2-_0a671c38-d307-447c-835e-7904ab143c26.v1.png" alt="">
                </div>

                <div id="content">
                    <p id="p">Pickup or delivery?</p>
                    <p id="s">Sacramento, 95829 . Sacramento</p>
                </div>

                <div id="arrow">
                    <i class="fa-solid fa-angle-down"></i>
                </div>
            </div>

            <div id="search_div">
                <input type="text" name="" id="input" placeholder="Search everything at Walmart online and in store">
                <button id="btn"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>

            <div class="reorder_div">
                <div class="icon"><i class="fa-regular fa-heart"></i></div>
                <div class="txt">
                    <p class="R">Reorder</p>
                    <p class="M">My Items</p>
                </div>
            </div>

            <div class="reorder_div">
                <div class="icon"><i class="fa-regular fa-user"></i></div>
                <div class="txt">
                    <p class="R">Sign In</p>
                    <p class="M">Account</p>
                </div>
            </div>

            <div id="cart_div">
                <i id="cart" class="fa-solid fa-cart-shopping"></i>
                <p id="num">$0.00</p>
            </div>
        </div>

        <div id="nav_btm">
            <div class="links" style="font-weight: 700; font-size: 13px;">
                <a href="">Departments</a><i class="fa-solid fa-angle-down"></i>
            </div>

            <div class="links" style="font-weight: 700; font-size: 13px;">
                <a href="">Services</a><i class="fa-solid fa-angle-down"></i>
            </div>

            <div class="links">
                <a href="">Get it Fast</a>
            </div>

            <div class="links">
                <a href="">Rollback & more</a>
            </div>

            <div class="links">
                <a href="">Valentine's Day</a>
            </div>

            <div class="links">
                <a href="">Virtual Care</a>
            </div>

            <div class="links">
                <a href="">New Arrivals</a>
            </div>

            <div class="links">
                <a href="">bettergoods</a>
            </div>

            <div class="links">
                <a href="">Game Time</a>
            </div>

            <div class="links">
                <a href="">Dinner Made Easy</a>
            </div>

            <div class="links">
                <a href="">My Items</a>
            </div>

            <div class="links" style="margin-right: 140px;">
                <a href="">Walmart+</a>
            </div>

            <div class="links" style="font-weight: 700; font-size: 14px;">
                <a href="">More</a><i class="fa-solid fa-angle-down"></i>
            </div>
        </div>
    </div>
</body>
</html>
